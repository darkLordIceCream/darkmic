<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>darkmic · Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #080808;
    --surface:   #0f0f0f;
    --border:    #1a1a1a;
    --text:      #a0a0a0;
    --text-dim:  #555;
    --accent:    #22c55e;
    --accent-dim:#166534;
    --warn:      #f59e0b;
    --danger:    #ef4444;
    --blue:      #3b82f6;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Grain overlay ─────────────────────────────── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
  }

  /* ── Layout ─────────────────────────────────────── */
  .dashboard {
    display: flex;
    gap: 32px;
    width: 100%;
    max-width: 880px;
    align-items: flex-start;
  }

  /* ── QR Panel (left) ────────────────────────────── */
  .qr-panel {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    position: relative;
  }

  .qr-panel::before {
    content: 'CONNECT';
    position: absolute;
    top: -9px;
    left: 20px;
    background: var(--bg);
    padding: 0 10px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--text-dim);
  }

  .qr-panel canvas {
    display: block;
    image-rendering: pixelated;
  }

  .qr-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-align: center;
    line-height: 1.6;
  }

  .qr-label strong {
    display: block;
    color: var(--text);
    font-weight: 400;
    font-size: 12px;
    word-break: break-all;
  }

  /* ── Main panel (right) ─────────────────────────── */
  .main-panel {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Header ──────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text);
  }

  .logo span { color: var(--text-dim); font-weight: 300; }

  /* ── Status badge ────────────────────────────────── */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: border-color 0.3s, color 0.3s;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .status-badge.idle    { color: var(--text-dim); }
  .status-badge.active  { color: var(--accent); border-color: var(--accent-dim); }
  .status-badge.error   { color: var(--danger); border-color: var(--danger); }
  .status-badge.active .status-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* ── Metrics row ─────────────────────────────────── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .metric {
    background: var(--surface);
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .metric-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .metric-value {
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .metric-value.live { color: var(--accent); }

  .metric-unit {
    font-size: 11px;
    font-weight: 300;
    color: var(--text-dim);
  }

  /* ── Log panel ───────────────────────────────────── */
  .log-panel {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 220px;
    max-height: 320px;
    overflow: hidden;
    position: relative;
  }

  .log-panel::before {
    content: 'EVENT LOG';
    position: absolute;
    top: -9px;
    left: 20px;
    background: var(--bg);
    padding: 0 10px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    z-index: 2;
  }

  .log-entries {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .log-entry {
    font-size: 11px;
    line-height: 1.5;
    display: flex;
    gap: 10px;
    animation: logIn 0.25s ease-out;
  }

  @keyframes logIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .log-time {
    color: var(--text-dim);
    flex-shrink: 0;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
  }

  .log-msg { color: var(--text); word-break: break-word; }
  .log-msg.warn { color: var(--warn); }
  .log-msg.good { color: var(--accent); }
  .log-msg.info { color: var(--blue); }

  /* ── Responsive ──────────────────────────────────── */
  @media (max-width: 720px) {
    .dashboard {
      flex-direction: column;
      align-items: center;
    }
    .qr-panel { width: 100%; max-width: 300px; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="dashboard">

  <!-- QR Panel -->
  <div class="qr-panel">
    <img id="qr-img" src="/api/qr" width="200" height="200" alt="QR Code" style="display:block">
    <div class="qr-label">
      Scan with mobile browser
      <strong id="qr-url">loading...</strong>
    </div>
  </div>

  <!-- Main Panel -->
  <div class="main-panel">

    <div class="header">
      <div class="logo">darkmic<span>/dashboard</span></div>
      <div class="status-badge idle" id="status-badge">
        <div class="status-dot"></div>
        <span id="status-text">idle</span>
      </div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Throughput</div>
        <div class="metric-value" id="metric-bytes">0</div>
        <div class="metric-unit">bytes received</div>
      </div>
      <div class="metric">
        <div class="metric-label">Chunks</div>
        <div class="metric-value" id="metric-chunks">0</div>
        <div class="metric-unit">opus frames</div>
      </div>
      <div class="metric">
        <div class="metric-label">Uptime</div>
        <div class="metric-value live" id="metric-uptime">00:00</div>
        <div class="metric-unit">since start</div>
      </div>
      <div class="metric">
        <div class="metric-label">Latency</div>
        <div class="metric-value live" id="metric-latency">—</div>
        <div class="metric-unit">one-way ms</div>
      </div>
    </div>

    <div class="log-panel">
      <div class="log-entries" id="log-entries">
        <div class="log-entry">
          <span class="log-time">--:--:--</span>
          <span class="log-msg info">dashboard loaded</span>
        </div>
      </div>
    </div>

  </div>

</div>

<script>

// ── Log helpers ─────────────────────────────────────

const logEntries = document.getElementById('log-entries');
function log(msg, cls = '') {
  const now = new Date();
  const time = now.toTimeString().slice(0, 8);
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-time">${time}</span><span class="log-msg ${cls}">${msg}</span>`;
  logEntries.appendChild(el);
  logEntries.scrollTop = logEntries.scrollHeight;
  // Keep max 200 entries
  while (logEntries.children.length > 200) logEntries.firstChild.remove();
}

// ── Status badge ────────────────────────────────────

const statusBadge = document.getElementById('status-badge');
const statusText = document.getElementById('status-text');
function setStatus(state) {
  const map = { idle: 'idle', connected: 'active', started: 'active', restarting: 'active', error: 'error', stopped: 'idle' };
  statusBadge.className = 'status-badge ' + (map[state] || 'idle');
  statusText.textContent = state;
}

// ── Metrics ─────────────────────────────────────────

const metricBytes = document.getElementById('metric-bytes');
const metricChunks = document.getElementById('metric-chunks');
const metricUptime = document.getElementById('metric-uptime');
const metricLatency = document.getElementById('metric-latency');
let totalBytes = 0;
let totalChunks = 0;
let startTime = null;
let isStreaming = false;

function formatBytes(n) {
  if (n < 1024) return n.toString();
  if (n < 1048576) return (n / 1024).toFixed(1) + 'K';
  return (n / 1048576).toFixed(1) + 'M';
}

function updateUptime() {
  if (!startTime || !isStreaming) return;
  const s = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  metricUptime.textContent =
    h > 0 ? `${h}:${String(m % 60).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`
          : `${String(m).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
}

setInterval(updateUptime, 1000);

// ── WebSocket for state/metric log ─────────────────

const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const wsUrl = `${protocol}//${location.host}`;
const ws = new WebSocket(wsUrl);
ws.binaryType = 'arraybuffer';

ws.onopen = () => log('WebSocket connected to server', 'info');

ws.onmessage = (event) => {
  if (typeof event.data !== 'string') return;
  try {
    const msg = JSON.parse(event.data);
    switch (msg.type) {
      case 'url':
        document.getElementById('qr-url').textContent = msg.url;
        log(`LAN URL: ${msg.url}`, 'info');
        break;
      case 'state':
        setStatus(msg.state);
        if (msg.state === 'started') { startTime = Date.now(); isStreaming = true; }
        if (msg.state === 'stopped') { isStreaming = false; metricLatency.textContent = '—'; }
        log(`state → <b>${msg.state}</b>`, msg.state === 'error' ? 'warn' : 'good');
        break;
      case 'stats':
        totalBytes = msg.bytes;
        totalChunks = msg.chunks;
        metricBytes.textContent = formatBytes(totalBytes);
        metricChunks.textContent = totalChunks.toString();
        if (!startTime) startTime = Date.now();
        break;
      case 'latency':
        metricLatency.textContent = msg.ms.toString();
        break;
    }
  } catch {}
};

ws.onclose = () => {
  setStatus('idle');
  log('WebSocket disconnected', 'warn');
};

ws.onerror = () => log('WebSocket error', 'warn');
</script>
</body>
</html>

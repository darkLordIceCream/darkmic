<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>darkmic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111; color: #eee;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    p { color: #888; margin-bottom: 2rem; }
    button {
      font-size: 1.2rem; padding: 1rem 2rem; border-radius: 999px;
      border: none; cursor: pointer; background: #22c55e; color: #fff;
      font-weight: 600; transition: background 0.2s;
    }
    button:active { background: #16a34a; }
    button.mic-off { background: #ef4444; }
    button.mic-off:active { background: #dc2625; }
    .status { margin-top: 1.5rem; font-size: 0.9rem; color: #666; }
    .status.connected { color: #22c55e; }
    .status.error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>darkmic</h1>
    <p>Using this phone as your PC microphone</p>
    <button id="micBtn">Start Microphone</button>
    <div id="status" class="status">Tap "Start Microphone" to begin</div>
  </div>
  <script src="/client.js"></script>
</body>
</html>
